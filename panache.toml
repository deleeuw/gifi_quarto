flavor = "quarto"

# Formatting style
[format]
wrap = "reflow"
line-width = 80
line-ending = "auto"

# External code formatters (opt-in)
[formatters]
r = "air"                   # Built-in preset
yaml = "yamlfmt"            # Formats both code blocks AND frontmatter

# Customize formatters
[formatters.prettier]
prepend-args = ["--print-width=100"]

# External code linters
[linters]
r = "jarl"      # Enable R linting

#[linter.rules] 
#duplicate-bibliography-key = true
#missing-bibliography-key = true

